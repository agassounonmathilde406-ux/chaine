<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Déclaration de Guerre</title>
    <!-- On charge le script officiel des WebApps Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1e;
            color: white;
            text-align: center;
            padding: 20px;
        }
        h2 { color: #ff3b30; }
        .guilde-card {
            background: #2c2c2e;
            border: 2px solid #3a3a3c;
            border-radius: 10px;
            padding: 15px;
            margin: 10px auto;
            max-width: 90%;
            cursor: pointer;
            transition: 0.2s;
        }
        .guilde-card:hover {
            border-color: #ff3b30;
            background: #3a3a3c;
        }
        .status {
            font-size: 12px;
            color: #34c759;
        }
    </style>
</head>
<body>

    <h2>⚔️ Déclarer une Guerre ⚔️</h2>
    <p>Sélectionnez une guilde libre pour lancer l'assaut :</p>
    
    <div id="liste-guildes"></div>

    <script>
        // Initialisation de la WebApp Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Ouvre la page en grand

        // Récupérer les données envoyées par le bot via l'URL (les guildes libres)
        const urlParams = new URLSearchParams(window.location.search);
        const guildesData = urlParams.get('guildes');
        
        if (guildesData) {
            const guildes = JSON.parse(decodeURIComponent(guildesData));
            const container = document.getElementById('liste-guildes');

            if (guildes.length === 0) {
                container.innerHTML = "<p>Aucune guilde libre pour le moment.</p>";
            }

            guildes.forEach(g => {
                const card = document.createElement('div');
                card.className = 'guilde-card';
                card.innerHTML = `
                    <strong>${g.nom}</strong><br>
                    <span class="status">🟢 Libre (Prête au combat)</span>
                `;
                
                // Quand on clique sur la guilde, on renvoie son ID au bot Telegram
                card.onclick = function() {
                    tg.sendData(JSON.stringify({ target_guild_id: g.id }));
                    tg.close(); // Ferme la mini app automatiquement
                };
                
                container.appendChild(card);
            });
        } else {
            document.getElementById('liste-guildes').innerHTML = "<p>Erreur de chargement des guildes.</p>";
        }
    </script>
</body>
</html>
